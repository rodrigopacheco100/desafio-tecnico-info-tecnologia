services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: info-tec-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=info_tec
      - RABBITMQ_DEFAULT_PASS=info_tec_secret
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - info-tec-network

  postgres:
    image: postgres:16
    container_name: info-tec-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=info_tec_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - info-tec-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: info-tec-api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    command: ["sh", "-c", "pnpm run build:packages && pnpm --filter @info-tec/api run dev:api"]
    env_file:
      - ./apps/api/.env.local
    environment:
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - info-tec-network

  consumer-service:
    build:
      context: .
      dockerfile: apps/consumer-service/Dockerfile.dev
    container_name: info-tec-consumer-service
    volumes:
      - .:/app
    working_dir: /app/apps/consumer-service
    command: ["pnpm", "run", "dev"]
    env_file:
      - ./apps/consumer-service/.env
    environment:
      - NODE_ENV=development
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - info-tec-network

networks:
  info-tec-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
