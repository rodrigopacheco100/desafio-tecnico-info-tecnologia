services:
  postgres:
    image: postgres:16
    container_name: info-tec-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=info_tec_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - info-tec-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: info-tec-api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/broker-contracts/node_modules
      - turbo-cache:/app/.turbo
    working_dir: /app
    command: ["npm", "run", "dev:api"]
    env_file:
      - ./apps/api/.env.local
    environment:
      - NODE_ENV=development
      - TURBO_TELEMETRY_DISABLED=1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - info-tec-network

networks:
  info-tec-network:
    driver: bridge

volumes:
  turbo-cache:
  postgres-data:
